<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

    name="description"
    content="Entre no grupo VIP de cosméticos e receba promoções de maquiagem, perfumes e skincare todos os dias no WhatsApp."
  />
  <link rel="icon" type="image/png" href="/assets/favicon.png" />

  <style>
    :root {
      --bg: #071a2b;
      --bg-2: #0c2136;
      --white: #ffffff;
      --muted: rgba(255,255,255,0.82);
      --green: #22c55e;
      --green-dark: #16a34a;
      --yellow: #fbbf24;
      --shadow: 0 18px 40px rgba(0,0,0,0.28);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.06), transparent 20%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      color: var(--white);
      min-height: 100vh;
    }

    .wrap {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: 28px 18px 40px;
      text-align: center;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .content {
      width: 100%;
    }

    .logo-circle {
      width: 150px;
      height: 150px;
      margin: 0 auto 26px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 0 60px rgba(34,197,94,0.15);
    }

    .logo-circle img {
      width: 132px;
      height: 132px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .online-dot {
      position: absolute;
      right: 8px;
      bottom: 14px;
      width: 22px;
      height: 22px;
      background: #22c55e;
      border-radius: 50%;
      border: 4px solid #0c2136;
    }

    h1 {
      font-size: 54px;
      line-height: 1.02;
      margin: 0 0 18px;
      font-weight: 900;
      letter-spacing: -1.5px;
      text-transform: uppercase;
    }

    h1 .highlight {
      color: var(--yellow);
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
      margin: 0 0 26px;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .cta {
      display: block;
      width: 100%;
      text-decoration: none;
      color: var(--white);
      font-size: 24px;
      font-weight: 900;
      text-transform: uppercase;
      padding: 22px 18px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--green) 0%, var(--green-dark) 100%);
      box-shadow: var(--shadow);
      margin: 0 auto 26px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 44px rgba(0,0,0,0.32);
    }

    .subtitle {
      font-size: 24px;
      line-height: 1.7;
      color: var(--muted);
      margin: 0 auto;
      max-width: 460px;
    }

    .subtitle strong {
      color: var(--white);
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 24px 18px 34px;
      }

      .logo-circle {
        width: 128px;
        height: 128px;
        margin-bottom: 22px;
      }

      .logo-circle img {
        width: 112px;
        height: 112px;
      }

      .online-dot {
        width: 20px;
        height: 20px;
      }

      h1 {
        font-size: 40px;
      }

      .stats {
        gap: 18px;
        font-size: 15px;
      }

      .cta {
        font-size: 21px;
        padding: 20px 16px;
      }

      .subtitle {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript>
    <iframe
      src="https://www.googletagmanager.com/ns.html?id=GTM-PXNNGNLN"
      height="0"
      width="0"
      style="display:none;visibility:hidden"
    ></iframe>
  </noscript>
  <!-- End Google Tag Manager (noscript) -->

  <main class="hero">
    <div class="wrap">
      <div class="content">
        <div class="logo-circle">
          <img src="/assets/logo.png" alt="Grupo VIP de Cosméticos" />
          <span class="online-dot"></span>
        </div>

        <h1>
          Chega de pagar caro em <span class="highlight">cosméticos!</span>
        </h1>

        <div class="stats">
          <span>100% gratuito</span>
          <span>+1.000 membros</span>
        </div>

        <a
          href="https://chat.whatsapp.com/HMP6fU1j9vl37xrDks7u40"
          id="btn-whatsapp"
          class="cta"
          target="_blank"
          rel="noopener noreferrer"
        >
          Entrar no grupo VIP do WhatsApp
        </a>

        <p class="subtitle">
          Receba as melhores promoções de <strong>maquiagem</strong>,
          <strong>perfumes</strong> e <strong>skincare</strong> todos os dias!
          💄✨
        </p>
      </div>
    </div>
  </main>
</body>
</html>
